spring:
  datasource:
    url: jdbc:mysql://localhost:3307/shop?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6380

# 微信小程序配置（开发环境默认 Mock 模式）
# 真实密钥请写入 application-local.yml（已 gitignore），然后激活 dev,local 双 profile
wx:
  ma:
    appid:
    secret:
    mock-enabled: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.shop: debug
