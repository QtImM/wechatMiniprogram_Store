# ============================================
# 生产环境配置
# 敏感信息通过环境变量注入，不会硬编码在文件中
# 使用方式：--spring.profiles.active=prod
# ============================================

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/shop?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

# 微信小程序 - 通过容器/平台环境变量注入
wx:
  ma:
    appid: ${WX_MA_APPID:}
    secret: ${WX_MA_SECRET:}
    mock-enabled: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.shop: info
